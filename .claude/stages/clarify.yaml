schema_version: 2.0.0
id: clarify
name: Clarify
description: 'Explores requirements, resolves ambiguity, and produces

  confirmed requirements before design work begins.'
templates: all
prerequisite_stage: ingest
next_stage: product-design-docs
human_gate: true
agent:
  primary: lc-pm
  reviewers:
  - lc-qa
  handoff_to: lc-pm
skills:
  required:
  - superpowers:brainstorming
  optional:
  - gsd:import
  - gsd:discuss-phase
  - oh-my-claudecode:deep-interview
  - openspec:explore
artifacts:
  required:
  - '{process_slug}/requirements/{session_id}/requirements.md'
  - '{process_slug}/requirements/{session_id}/user-stories.md'
  - '{process_slug}/prd.md'
  optional:
  - '{process_slug}/prd-v*.md'
context:
  goal: 基于访谈产物（逐字稿、摘要、初始洞察）与人类 PM 进行多轮澄清，形成统一、可追溯、已确认的需求文档，并将 PRD 置于 issue-package 根级（{process_slug}/prd.md）作为串联后续所有阶段的主线文档与单一事实来源。
  constraints: '- 仅通过 scripts/stage_loader.py 更新 {process_slug}/workflow-stage.yaml。

    - 禁止修改 {process_slug}/recordings/ 中的原始文件。

    - 本阶段设有 human_gate，必须获得人类 PM 显式确认后才能进入下一阶段。

    - PRD 必须位于 {process_slug}/prd.md，并携带 <!-- version: vX.Y --> 版本标记；确认后通过 scripts/lincoln_prd.py freeze 生成不可变的 prd-vX.Y.md 快照。

    - PRD 是产研流程的主线文档，需在后续阶段持续维护「相关产物链接」章节，指向设计、原型、OpenSpec、实现等产物。

    - 门控评估优先使用 AI 能力：读取产物并推理其完整性，而非仅依赖脚本化检查。

    - 详细执行步骤、模板与工具见对应 skill prompt 和 .claude/agents/<primary_agent>.md。'
gates:
  entry:
  - check: previous_stage_completed
    args:
    - ingest
  exit:
  - check: artifacts_present
  - check: prd_has_required_sections
    args:
    - '{process_slug}/prd.md'
  - check: human_approved
  - check: prd_snapshot_present
    args:
    - '{process_slug}/prd.md'
