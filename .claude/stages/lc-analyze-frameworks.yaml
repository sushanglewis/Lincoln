schema_version: 2.0.0
id: lc-analyze-frameworks
name: 分析框架应用
description: '选择并应用 SWOT、波特五力、商业模式画布、PEST 等分析框架，规划可视化方案。'
templates:
- pm-research
prerequisite_stage: lc-competitive-analysis
next_stage: lc-storytelling
human_gate: false
agent:
  primary: lc-researcher
  reviewers:
  - lc-pm
  handoff_to: null
skills:
  required: []
  optional: []
artifacts:
  required:
  - '{process_slug}/research/{session_id}/analysis-frameworks.md'
context:
  goal: 选择并应用 SWOT、波特五力、商业模式画布、PEST 等分析框架，规划可视化方案。
  constraints: '- 仅通过 scripts/stage_loader.py 更新 {process_slug}/workflow-stage.yaml 或 .context/workflow/pm-research.yaml。

    - 本阶段产物写入 {process_slug}/research/{session_id}/。

    - 门控评估优先使用 AI 能力：读取产物并推理其完整性，而非仅依赖脚本化检查。

    - 详细执行步骤、模板与工具见对应 skill prompt 和 .claude/agents/<primary_agent>.md。'
gates:
  entry:
  - check: previous_stage_completed
    args:
    - lc-competitive-analysis
  exit:
  - check: artifacts_present
