schema_version: 2.0.0
id: propose
name: Propose
description: 'Generates a complete OpenSpec change proposal including

  proposal.md, design.md, tasks.md, and specs/ directory.'
templates: all
prerequisite_stage: tdd-development-plan
next_stage: split
human_gate: false
agent:
  primary: lincoln-engineer
  reviewers:
  - lincoln-qa
  - lincoln-architect
  handoff_to: lincoln-pm
skills:
  required:
  - openspec:propose
  optional:
  - superpowers:verification-before-completion
  - oh-my-claudecode:verify
artifacts:
  required:
  - '{process_slug}/openspec/changes/{change_name}/proposal.md'
  - '{process_slug}/openspec/changes/{change_name}/design.md'
  - '{process_slug}/openspec/changes/{change_name}/tasks.md'
  - '{process_slug}/openspec/changes/{change_name}/specs/'
context:
  goal: '基于已确认的 TDD 研发计划，调用 OpenSpec CLI 生成标准变更提案 artifact 目录（`{process_slug}/openspec/changes/{change_name}/`），将
    TDD 计划转化为结构化的 OpenSpec 变更提案，作为后续 GitHub Issues 拆分和研发实现的依据。


    基于已确认的 TDD 研发计划，调用 OpenSpec CLI 生成标准变更提案 artifact，将 TDD 计划转化为结构化的 OpenSpec 变更提案。'
  entry: "执行阶段前必须全部通过：\n\n- [ ] **TDD 计划就绪检查**: `tdd_plan_ready {design_id}`\n  -\
    \ `{process_slug}/designs/{design_id}/tdd-plan.md` 存在且非空\n  - 包含 `<!-- status:\
    \ ready-for-openspec -->` 标记\n  - 失败时：提示人类先完成 `tdd-development-plan` 阶段"
  execution: "## Allowed actions\n- 读取 `{process_slug}/requirements/{session_id}/requirements.md`（需求来源）\n\
    - 读取 `{process_slug}/designs/{design_id}/` 下的所有设计产物：\n  - `tdd-plan.md`、`design-review.md`、`feature-catalog.md`\n\
    \  - `data-model.md`、`flows.md`、`feasibility.md`\n  - `fields.md`、`ui-spec.md`\n\
    - 调用 OpenSpec CLI：`openspec propose {change_name}`\n  - 优先尝试：`openspec propose\
    \ {change_name} --from {process_slug}/designs/{design_id}/tdd-plan.md`\n  - 次选：`openspec\
    \ propose {change_name}` 并 pipe TDD 计划内容\n  - 失败时读取 `openspec propose --help`\
    \ 并适配\n- 验证生成的 OpenSpec artifact 完整性\n- 检查 `{process_slug}/openspec/changes/{change_name}/`\
    \ 是否已存在，存在时询问人类是否覆盖\n\n## Side-effect strategy\n- 产物写入 `{process_slug}/openspec/changes/{change_name}/`\
    \ 目录\n- 不修改任何已有设计文档或需求文档\n- 不修改 `tdd-plan.md`（只读取）\n- 保留 OpenSpec CLI 生成的原始结构\n\
    - 人类可直接编辑 OpenSpec artifact，编辑后运行 `workflow-continue`\n\n## During execution\n\
    - [ ] OpenSpec CLI 已执行并生成产物\n- [ ] 已调用 `superpowers:verification-before-completion`\
    \ 验证产物\n- [ ] 退出校验全部通过\n- [ ] 读取 `{process_slug}/requirements/{session_id}/requirements.md`（需求来源）\n\
    - [ ] 读取 `{process_slug}/designs/{design_id}/tdd-plan.md`（TDD 计划输入）\n- [ ] 读取\
    \ `{process_slug}/designs/{design_id}/design-review.md`（设计评审）\n- [ ] 读取 `{process_slug}/designs/{design_id}/feature-catalog.md`（功能清单）\n\
    - [ ] 读取 `{process_slug}/designs/{design_id}/data-model.md`（数据模型）\n- [ ] 读取 `{process_slug}/designs/{design_id}/flows.md`（流程图）\n\
    - [ ] 读取 `{process_slug}/designs/{design_id}/feasibility.md`（可行性分析）\n- [ ] 读取\
    \ `{process_slug}/designs/{design_id}/fields.md`（字段规格）\n- [ ] 读取 `{process_slug}/designs/{design_id}/ui-spec.md`（UI\
    \ 规格）\n- [ ] 检查 `{process_slug}/openspec/changes/{change_name}/` 是否已存在\n  - 若已存在，询问人类是否覆盖\n\
    - [ ] 调用 OpenSpec CLI（按优先级尝试）：\n  1. `openspec propose {change_name} --from {process_slug}/designs/{design_id}/tdd-plan.md`\n\
    \  2. `openspec propose {change_name}` 并 pipe TDD 计划内容\n  3. 若均失败，读取 `openspec\
    \ propose --help` 并适配\n- [ ] 验证生成的 artifact 文件存在且非空：\n  - `{process_slug}/openspec/changes/{change_name}/proposal.md`\n\
    \  - `{process_slug}/openspec/changes/{change_name}/specs/`（至少一个文件）\n  - `{process_slug}/openspec/changes/{change_name}/design.md`\n\
    \  - `{process_slug}/openspec/changes/{change_name}/tasks.md`\n- [ ] 验证 OpenSpec\
    \ artifact 引用以下设计产物：\n  - `{process_slug}/designs/{design_id}/tdd-plan.md`\n \
    \ - `{process_slug}/designs/{design_id}/prototype.pen`\n  - `{process_slug}/designs/{design_id}/design-review.md`\n\
    \n## Failure recovery\n- 准入校验失败（TDD 计划未就绪）：提示人类先完成 `tdd-development-plan` 阶段\n\
    - OpenSpec CLI 调用失败：读取 `openspec propose --help`，尝试适配调用方式\n- 退出校验失败（artifact 缺失）：报告错误，暂停等待人类干预\n\
    - 退出校验失败（引用缺失）：补充对设计产物的引用，重新校验\n- 人类直接编辑文件后：运行 `workflow-continue`，Agent 重新读取文件并重新校验\n\
    \n## Skills and tools\n# OpenSpec 提案阶段技能与工具\n\n## 技能路由\n\n本阶段技能路由定义见 `.claude/skills/routing.yaml`：\n\
    - **required**: `openspec:propose`\n- **optional**: `superpowers:verification-before-completion`,\
    \ `oh-my-claudecode:verify`\n- **human_gate**: 否\n\n## 主技能命令\n\n- **命令**: `propose-with-openspec`\n\
    - **来源**: `.claude/skills/`\n- **参数**:\n  - `session_id` (必填): 访谈会话 ID，如 `2026-06-27-stakeholder`\n\
    \  - `design_id` (必填): 产品设计 ID，如 `checkout-redesign`\n  - `change_name` (必填):\
    \ OpenSpec 变更名称，短横线命名，如 `add-csv-export`\n- **提示文件**: `.claude/skills/propose-with-openspec/prompts/main.md`\n\
    \n## 辅助技能\n\n- `workflow-continue` — 人类修改 OpenSpec artifact 后恢复被暂停的工作流\n  - 人类可直接编辑\
    \ OpenSpec artifact 后运行此命令\n  - Agent 重新读取文件并重新校验\n- `split-to-github` — 下一阶段命令（OpenSpec\
    \ 提案就绪后执行）\n- `superpowers:verification-before-completion` — OpenSpec CLI 生成产物后，必须运行验证并阅读输出，确认\
    \ 0 失败才能声明完成。\n  规则：没有新鲜验证证据，不得声称 `propose` 完成。\n\n## OpenSpec CLI 使用\n\n- **CLI\
    \ 命令**: `openspec propose {change_name}`\n- **输入文件**: `{process_slug}/designs/{design_id}/tdd-plan.md`\n\
    - **调用优先级**:\n  1. `openspec propose {change_name} --from {process_slug}/designs/{design_id}/tdd-plan.md`\n\
    \  2. `openspec propose {change_name}` 并 pipe TDD 计划内容到 stdin\n  3. 若均失败：`openspec\
    \ propose --help` 读取帮助并适配\n- **输出目录**: `{process_slug}/openspec/changes/{change_name}/`\n\
    \n## 校验器使用\n\n- **校验器路径**: `scripts/validate_stage.py`\n- **使用方式**:\n  ```bash\n\
    \  # 准入校验（TDD 计划就绪）\n  python scripts/validate_stage.py \\\n    --phase entry\
    \ --check tdd_plan_ready --args {design_id}\n\n  # 退出校验（OpenSpec artifact 完整）\n\
    \  python scripts/validate_stage.py \\\n    --phase exit --check openspec_artifact_complete\
    \ --args {change_name},{design_id}\n\n  # 退出校验（任务已提取）\n  python scripts/validate_stage.py\
    \ \\\n    --phase exit --check tasks_extracted --args {change_name}\n  ```\n\n\
    ## 允许的工具\n\n根据 `skill.yaml` 的 `tools` 列表，本阶段可用：\n\n| 工具 | 用途 |\n|------|------|\n\
    | `Read` | 读取 TDD 计划、设计文档、需求文档、OpenSpec artifact |\n| `Grep` | 在 artifact 中搜索设计引用\
    \ |\n| `Glob` | 查找 OpenSpec 生成的文件 |\n| `Bash` | 调用 OpenSpec CLI、检查目录状态 |\n| `Edit`\
    \ | 不适用（不修改 OpenSpec CLI 生成的文件） |\n| `Write` | 不适用（不手动生成 artifact） |\n\n## 产物规范\n\
    \nOpenSpec CLI 生成的标准目录结构：\n\n```\n{process_slug}/openspec/changes/{change_name}/\n\
    ├── proposal.md      # 变更提案概述\n├── specs/           # 详细规格文件（至少一个 .md）\n├── design.md\
    \        # 设计文档\n└── tasks.md         # 任务列表（用于 GitHub Issues 拆分）\n```\n\n## 错误处理\n\
    \n| 错误场景 | 处理方式 |\n|---------|---------|\n| TDD 计划未就绪 | 暂停，提示人类先完成 `tdd-development-plan`\
    \ 阶段 |\n| `{process_slug}/openspec/changes/{change_name}/` 已存在 | 询问人类是否覆盖 |\n\
    | OpenSpec CLI 调用失败 | 读取 `openspec propose --help`，尝试适配调用方式 |\n| OpenSpec CLI\
    \ 所有调用方式均失败 | 暂停，向人类报告 CLI 错误信息 |\n| artifact 文件缺失 | 报告错误，暂停等待人类干预 |\n| artifact\
    \ 引用缺失 | 补充对设计产物的引用，重新校验 |\n| 任务列表为空 | 报告错误，暂停等待人类干预 |\n| 人类直接编辑后运行 continue |\
    \ 重新读取文件，重新校验 |\n\n## 关键规则\n\n- **不绕过 OpenSpec CLI**：所有 artifact 必须通过 CLI 生成，不手动创建\n\
    - **保留原始结构**：不修改 OpenSpec CLI 生成的文件结构和格式\n- **引用完整性**：artifact 必须引用 TDD 计划、Pencil\
    \ 原型和核心设计文档\n- **任务可拆分**：tasks.md 必须包含可识别的任务列表，供 `split` 阶段使用\n- **change_name\
    \ 格式**：短横线命名（kebab-case），如 `add-csv-export`\n\n## Execution instructions\n1. **读取完整提示文件**:\
    \ `.claude/skills/propose-with-openspec/prompts/main.md`\n   - 该文件包含详细的 OpenSpec\
    \ CLI 调用步骤和 artifact 验证规则\n   - 按照提示文件中的步骤 1-9 执行\n\n2. **阶段状态感知**:\n   - 当前阶段状态由\
    \ session-start hook 自动加载，必要时读取 `<process_slug>/workflow-stage.yaml`\n   - 若本阶段已有\
    \ `completed` 节点，检查是否需要重新生成（人类要求时）\n   - 若当前节点状态为 `validation_failed`，根据 `error_message`\
    \ 修复后重试\n   - 若人类运行 `workflow-continue`，重新读取 OpenSpec artifact 并重新校验\n\n3. **变量替换**:\n\
    \   - 使用 `state.variables.session_id` 作为会话标识\n   - 使用 `state.variables.design_id`\
    \ 作为设计标识\n   - 使用 `state.variables.change_name` 作为 OpenSpec 变更名称\n\n## Completion\
    \ actions\n1. 运行退出校验器验证 artifact 完整性和引用完整性\n2. 通过 `scripts/stage_loader.py --stage\
    \ propose --action transition-next` 推进阶段（节点追加模式）\n3. 向人类汇报：\n   - OpenSpec 提案已生成\n\
    \   - 产物存放路径：`{process_slug}/openspec/changes/{change_name}/`\n   - 下一阶段入口：`split`（运行\
    \ `claude split-to-github <session_id> <change_name>`）"
  exit: "阶段完成后必须全部通过：\n\n- [ ] **OpenSpec artifact 完整性检查**: `openspec_artifact_complete\
    \ {change_name},{design_id}`\n  - `{process_slug}/openspec/changes/{change_name}/proposal.md`\
    \ 存在且非空\n  - `{process_slug}/openspec/changes/{change_name}/specs/` 目录存在且非空\n\
    \  - `{process_slug}/openspec/changes/{change_name}/design.md` 存在且非空\n  - `{process_slug}/openspec/changes/{change_name}/tasks.md`\
    \ 存在且非空\n  - 所有 artifact 文件综合内容中引用 `{process_slug}/designs/{design_id}/tdd-plan.md`\n\
    \  - 所有 artifact 文件综合内容中引用 `{process_slug}/designs/{design_id}/prototype.pen`\n\
    \  - 所有 artifact 文件综合内容中引用 `{process_slug}/designs/{design_id}/design-review.md`\n\
    \  - 失败时：报告错误并暂停，等待人类干预\n\n- [ ] **任务提取检查**: `tasks_extracted {change_name}`\n\
    \  - `{process_slug}/openspec/changes/{change_name}/tasks.md` 包含至少一个可识别的任务项（`[-*]\
    \ [.?] ...` 格式）\n  - 失败时：报告错误并暂停\n\n## Artifact verification\n- [ ] `{process_slug}/openspec/changes/{change_name}/proposal.md`\
    \ — 非空\n- [ ] `{process_slug}/openspec/changes/{change_name}/specs/*.md` — 至少一个文件，非空\n\
    - [ ] `{process_slug}/openspec/changes/{change_name}/design.md` — 非空\n- [ ] `{process_slug}/openspec/changes/{change_name}/tasks.md`\
    \ — 非空，包含可识别的任务列表\n- [ ] OpenSpec artifact 引用 TDD 计划、Pencil 原型和核心设计文档\n- [ ] 保留\
    \ OpenSpec CLI 生成的原始结构，未手动修改"
  constraints: '## Forbidden actions

    - **禁止在 TDD 计划未标记 ready-for-openspec 时调用 OpenSpec CLI**

    - **禁止绕过 OpenSpec CLI 手动生成 artifact 文件**（proposal.md、specs/、design.md、tasks.md）

    - **禁止修改 OpenSpec CLI 生成的文件结构**

    - 禁止修改 `{process_slug}/designs/{design_id}/` 下的任何设计文档

    - 禁止修改 `{process_slug}/requirements/` 目录下的需求文档

    - 禁止绕过校验继续工作流


    ## Human confirmation

    本阶段 **无** `human_gate: true`，为 Agent 自主执行阶段。


    - 但产物质量由 `openspec_artifact_complete` 和 `tasks_extracted` 退出校验严格把关

    - 校验失败时暂停，等待人类修复或指示

    - 人类可直接编辑 OpenSpec artifact 后运行 `workflow-continue`

    - 隐式确认：通过退出校验即视为可进入下一阶段

    - 若 `{process_slug}/openspec/changes/{change_name}/` 已存在，需询问人类是否覆盖


    ## Key reminders

    - **TDD 计划必须就绪**：未标记 `ready-for-openspec` 不得调用 OpenSpec CLI

    - **不绕过 CLI**：所有 artifact 必须通过 OpenSpec CLI 生成，禁止手动创建

    - **保留原始结构**：不修改 OpenSpec CLI 生成的文件结构和格式

    - **引用完整性**：artifact 必须引用 TDD 计划、Pencil 原型和核心设计文档

    - **覆盖确认**：若 `{process_slug}/openspec/changes/{change_name}/` 已存在，需询问人类是否覆盖

    - **支持直接编辑**：人类可编辑 OpenSpec artifact 后运行 `workflow-continue`'
gates:
  entry:
  - check: previous_gate_passed
    args:
    - tdd-development-plan
  exit:
  - check: artifact_exists
    args:
    - '{process_slug}/openspec/changes/{change_name}/proposal.md'
  - check: artifact_exists
    args:
    - '{process_slug}/openspec/changes/{change_name}/design.md'
  - check: artifact_exists
    args:
    - '{process_slug}/openspec/changes/{change_name}/tasks.md'
  - check: artifact_exists
    args:
    - '{process_slug}/openspec/changes/{change_name}/specs/'
