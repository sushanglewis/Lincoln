schema_version: 2.0.0
id: lc-competitive-analysis
name: 竞品分析
description: '分析竞争格局、竞争对手定位与差异化机会。'
templates:
- pm-research
prerequisite_stage: lc-product-research
next_stage: lc-analyze-frameworks
human_gate: false
agent:
  primary: lc-researcher
  reviewers:
  - lc-pm
  handoff_to: null
skills:
  required: []
  optional: []
artifacts:
  required:
  - '{process_slug}/research/{session_id}/competitive.md'
context:
  goal: 分析竞争格局、竞争对手定位与差异化机会。
  constraints: '- 仅通过 scripts/stage_loader.py 更新 {process_slug}/workflow-stage.yaml 或 .context/workflow/pm-research.yaml。

    - 本阶段产物写入 {process_slug}/research/{session_id}/。

    - 门控评估优先使用 AI 能力：读取产物并推理其完整性，而非仅依赖脚本化检查。

    - 详细执行步骤、模板与工具见对应 skill prompt 和 .claude/agents/<primary_agent>.md。'
gates:
  entry:
  - check: previous_stage_completed
    args:
    - lc-product-research
  exit:
  - check: artifacts_present
