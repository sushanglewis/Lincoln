schema_version: 2.0.0
id: lc-collect-intelligence
name: 信息收集
description: '基于权威报告、官方动态、开放 API 等渠道体系化收集研究证据并标注来源。'
templates:
- pm-research
prerequisite_stage: lc-analyze-frameworks
next_stage: lc-storytelling
human_gate: false
agent:
  primary: lc-researcher
  reviewers:
  - lc-pm
  handoff_to: null
skills:
  required:
  - lincoln:lc-collect-intelligence
  optional: []
artifacts:
  required:
  - '{process_slug}/research/{session_id}/collected-intelligence.md'
context:
  goal: 基于权威报告、官方动态、开放 API 等渠道体系化收集研究证据并标注来源。
  constraints: '- 仅通过 scripts/stage_loader.py 更新 {process_slug}/workflow-stage.yaml 或 .context/workflow/pm-research.yaml。

    - 本阶段产物写入 {process_slug}/research/{session_id}/。

    - 门控评估优先使用 AI 能力：读取产物并推理其完整性，而非仅依赖脚本化检查。

    - 详细执行步骤、模板与工具见对应 skill prompt 和 .claude/agents/<primary_agent>.md。'
gates:
  entry:
  - check: previous_stage_completed
    args:
    - lc-analyze-frameworks
  exit:
  - check: artifacts_present
